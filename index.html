<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rijawan ai - Premium Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        space: ['Space Grotesk', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: radial-gradient(circle at center, #0d1117 0%, #0a0e1a 100%);
            font-family: 'Inter', sans-serif;
        }
        .neon-glow {
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.7), 0 0 20px rgba(6, 182, 212, 0.5);
        }
        .glass-card {
            background: rgba(13, 17, 23, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(6, 182, 212, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .btn-primary-3d {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
        }
        .btn-primary-3d:active {
            transform: translateY(2px);
            box-shadow: 0 2px 5px rgba(6, 182, 212, 0.2);
        }
        /* আইফ্রেম রেসপনসিভ ডিজাইন */
        .iframe-container {
            position: relative;
            width: 100%;
            height: 250px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(6, 182, 212, 0.3);
            background: rgba(10, 14, 26, 0.5);
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col justify-between">

    <header class="w-full max-w-5xl mx-auto px-4 py-6 flex justify-between items-center border-b border-cyan-900/30">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-cyan-500/20 flex items-center justify-center border border-cyan-400/50 shadow-[0_0_15px_rgba(6,182,212,0.4)]">
                <i class="fa-solid fa-bolt text-cyan-400 text-xl animate-pulse"></i>
            </div>
            <span class="font-space font-bold text-2xl tracking-wide bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent neon-glow">Rijawan ai</span>
        </div>
        <div class="text-xs font-space px-3 py-1.5 rounded-full bg-cyan-900/40 border border-cyan-500/30 text-cyan-400 font-bold">
            PRO VERSION
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-2xl glass-card rounded-3xl p-6 md:p-8 space-y-8 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-cyan-500/10 rounded-full blur-3xl pointer-events-none"></div>
            
            <div class="text-center space-y-2">
                <h2 class="font-space font-bold text-3xl md:text-4xl text-white">Premium Video Downloader</h2>
                <p class="text-slate-400 text-sm">Paste your video link below to extract high-quality Audio or Video</p>
            </div>

            <div class="space-y-4">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-cyan-500">
                        <i class="fa-solid fa-link text-lg"></i>
                    </span>
                    <input type="url" id="videoUrl" placeholder="Paste video URL here..." 
                           class="w-full pl-12 pr-4 py-4 rounded-2xl bg-slate-900/80 border border-slate-700 focus:border-cyan-500 focus:outline-none text-white font-inter placeholder-slate-500 transition-all">
                </div>
                
                <button onclick="getVideoInfo()" id="fetchBtn" class="w-full py-4 rounded-2xl font-space font-bold text-white btn-primary-3d tracking-wider flex items-center justify-center gap-2 text-base">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> FETCH & GENERATE LINKS
                </button>
            </div>

            <div id="loading" class="hidden text-center py-6">
                <div class="inline-block w-8 h-8 border-4 border-cyan-400 border-t-transparent rounded-full animate-spin mb-2"></div>
                <p class="text-cyan-400 text-sm font-space">Processing and securing safe download lanes, please wait...</p>
            </div>

            <div id="errorBox" class="hidden bg-red-950/40 border border-red-500/30 text-red-400 p-4 rounded-2xl text-center text-sm font-inter"></div>

            <div id="resultSection" class="hidden space-y-6 pt-4 border-t border-slate-800">
                <div class="text-center md:text-left">
                    <h4 class="font-space text-sm font-bold text-slate-300 tracking-wide uppercase mb-3">
                        <i class="fa-solid fa-download mr-1 text-cyan-400"></i> Select Quality & Download Directly Inside Website:
                    </h4>
                </div>

                <div class="iframe-container">
                    <iframe id="downloadIframe" src="" width="100%" height="100%" style="border:none; scrolling:no; overflow:hidden;"></iframe>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-6 border-t border-cyan-900/20 text-slate-500 text-xs font-space">
        &copy; 2026 RIJAWAN DIGITAL PROJECTS. ALL RIGHTS RESERVED.
    </footer>

    <script>
        function extractVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        async function getVideoInfo() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const fetchBtn = document.getElementById('fetchBtn');
            const loading = document.getElementById('loading');
            const errorBox = document.getElementById('errorBox');
            const resultSection = document.getElementById('resultSection');
            const downloadIframe = document.getElementById('downloadIframe');

            if (!urlInput) {
                showError('Please paste a valid video URL!');
                return;
            }

            const videoId = extractVideoId(urlInput);

            if (!videoId) {
                showError('Could not recognize this YouTube Link. Try copying again!');
                return;
            }

            errorBox.classList.add('hidden');
            resultSection.classList.add('hidden');
            loading.classList.remove('hidden');
            fetchBtn.disabled = true;

            try {
                // এটি আপনার নিজস্ব সাইটের ভেতরেই একটি প্রিমিয়াম সিকিউর উইজেট লোড করবে
                // কোনো রিডাইরেক্ট নেই, কোনো নতুন ট্যাব ওপেন হবে না
                const secureDownloadUrl = `https://loader.to/api/card/?url=https://www.youtube.com/watch?v=${videoId}&css=https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css`;
                
                downloadIframe.src = secureDownloadUrl;

                // আইফ্রেম লোড হওয়ার জন্য সামান্য একটু অপেক্ষা
                setTimeout(() => {
                    loading.classList.add('hidden');
                    resultSection.classList.remove('hidden');
                    fetchBtn.disabled = false;
                }, 1500);

            } catch (err) {
                loading.classList.add('hidden');
                fetchBtn.disabled = false;
                showError('Server busy. Please try again.');
            }
        }

        function showError(msg) {
            const errorBox = document.getElementById('errorBox');
            errorBox.innerText = msg;
            errorBox.classList.remove('hidden');
        }
    </script>
</body>
</html>
