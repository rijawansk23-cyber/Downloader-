<style>
.line-clamp-2{
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
}
</style>

<script>
function extractVideoId(url) {
    const regex =
    /(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/)|youtu\.be\/)([^&?\n]+)/;

    const match = url.match(regex);
    return match ? match[1] : null;
}

function generateDownloadOptions() {
    const urlInput = document.getElementById('videoUrl').value.trim();
    const errorBox = document.getElementById('errorBox');
    const resultSection = document.getElementById('resultSection');
    const loading = document.getElementById('loading');

    if (!urlInput) {
        showError('Please paste a valid YouTube URL.');
        return;
    }

    const videoId = extractVideoId(urlInput);

    if (!videoId) {
        showError('Invalid YouTube link detected.');
        return;
    }

    errorBox.classList.add('hidden');
    resultSection.classList.add('hidden');
    loading.classList.remove('hidden');

    setTimeout(() => {

        const thumb = document.getElementById('thumb');

        thumb.onerror = function () {
            this.src =
            `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
        };

        thumb.src =
        `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;

        document.querySelector(
            '#resultSection h3'
        ).textContent = 'YouTube Video Ready';

        document.getElementById('server1Btn').href =
        `https://invidious.projectsegfau.lt/latest_version?id=${videoId}&itag=22`;

        document.getElementById('server2Btn').href =
        `https://inv.tux.digital/latest_version?id=${videoId}&itag=22`;

        document.getElementById('server3Btn').href =
        `https://invidious.perennialte.ch/latest_version?id=${videoId}&itag=22`;

        document.getElementById('audioBtn').href =
        `https://invidious.projectsegfau.lt/latest_version?id=${videoId}&itag=140`;

        loading.classList.add('hidden');
        resultSection.classList.remove('hidden');

    }, 800);
}

function showError(message) {
    const errorBox = document.getElementById('errorBox');

    errorBox.textContent = message;
    errorBox.classList.remove('hidden');

    document.getElementById('loading').classList.add('hidden');
    document.getElementById('resultSection').classList.add('hidden');
}
</script>
